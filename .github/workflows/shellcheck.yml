name: Shellcheck

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  bash-check:
    name: Bash syntax and shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: |
          set -euo pipefail
          find . -type f -name '*.sh' -print0 | while IFS= read -r -d '' file; do
            echo "bash -n $file"
            bash -n "$file"
          done

      - name: Shellcheck
        run: |
          set -euo pipefail
          find . -type f -name '*.sh' -print0 | xargs -0 shellcheck \
            --severity=warning \
            --external-sources
